<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Daily Tarot Widget</title>
<style>
  body {
    margin: 0;
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    font-family: 'Georgia', serif;
    text-align: center;
    color: white;
    transition: background 1s ease;
  }

  .card {
    background: rgba(0,0,0,0.8); /* fallback, overridden by JS */
    border: 2px solid white;
    padding: 20px;
    border-radius: 16px;
    max-width: 300px;
    width: 90%;
    box-shadow: 0 8px 25px rgba(0,0,0,0.5);
  }

  h2 {
    font-size: 18px;
    margin: 8px 0 4px;
    text-shadow: 1px 1px 2px rgba(0,0,0,0.7);
  }

  p {
    font-size: 14px;
    line-height: 1.4;
    opacity: 0.9;
  }
</style>
</head>
<body>

<div class="card">
  <h2 id="cardName"></h2>
  <p id="cardMeaning"></p>
</div>

<script>
const tarotDeck = [
  // Major Arcana
  {name:"The Fool", meaning:"New beginnings, openness, and trust in the journey.", suit:"major"},
  {name:"The Magician", meaning:"You have the tools to create what you need.", suit:"major"},
  {name:"The High Priestess", meaning:"Trust your intuition and inner voice.", suit:"major"},
  {name:"The Empress", meaning:"Nurture yourself and allow growth.", suit:"major"},
  {name:"The Emperor", meaning:"Structure and stability support your path.", suit:"major"},
  {name:"The Hierophant", meaning:"Seek wisdom from tradition or guidance.", suit:"major"},
  {name:"The Lovers", meaning:"Align with your values and connections.", suit:"major"},
  {name:"The Chariot", meaning:"Stay focused and move forward with purpose.", suit:"major"},
  {name:"Strength", meaning:"Gentle strength and compassion carry you.", suit:"major"},
  {name:"The Hermit", meaning:"Take time for reflection and clarity.", suit:"major"},
  {name:"Wheel of Fortune", meaning:"Change is part of the cycle—trust it.", suit:"major"},
  {name:"Justice", meaning:"Fairness and truth guide your decisions.", suit:"major"},
  {name:"The Hanged Man", meaning:"Pause and see things differently.", suit:"major"},
  {name:"Death", meaning:"Transformation and new beginnings follow endings.", suit:"major"},
  {name:"Temperance", meaning:"Balance and patience bring harmony.", suit:"major"},
  {name:"The Devil", meaning:"Notice what holds you back and reclaim control.", suit:"major"},
  {name:"The Tower", meaning:"Sudden change clears the way for truth.", suit:"major"},
  {name:"The Star", meaning:"Hope and healing are present.", suit:"major"},
  {name:"The Moon", meaning:"Navigate uncertainty with intuition.", suit:"major"},
  {name:"The Sun", meaning:"Joy, clarity, and warmth surround you.", suit:"major"},
  {name:"Judgement", meaning:"Reflect, release, and step forward renewed.", suit:"major"},
  {name:"The World", meaning:"Completion and fulfillment are within reach.", suit:"major"},

  // Cups
  {name:"Ace of Cups", meaning:"New emotional beginnings, love and intuition.", suit:"cups"},
  {name:"Two of Cups", meaning:"Partnerships, harmony, and connection.", suit:"cups"},
  {name:"Three of Cups", meaning:"Celebration and friendship.", suit:"cups"},
  {name:"Four of Cups", meaning:"Reflection, apathy, and reevaluation.", suit:"cups"},
  {name:"Five of Cups", meaning:"Loss, grief, and focusing on what remains.", suit:"cups"},
  {name:"Six of Cups", meaning:"Nostalgia and memories from the past.", suit:"cups"},
  {name:"Seven of Cups", meaning:"Choices, illusions, and imagination.", suit:"cups"},
  {name:"Eight of Cups", meaning:"Walking away, seeking deeper meaning.", suit:"cups"},
  {name:"Nine of Cups", meaning:"Contentment and wishes fulfilled.", suit:"cups"},
  {name:"Ten of Cups", meaning:"Emotional fulfillment and family happiness.", suit:"cups"},
  {name:"Page of Cups", meaning:"Curiosity, creative beginnings.", suit:"cups"},
  {name:"Knight of Cups", meaning:"Romantic proposals, pursuit of dreams.", suit:"cups"},
  {name:"Queen of Cups", meaning:"Compassion and emotional wisdom.", suit:"cups"},
  {name:"King of Cups", meaning:"Emotional balance and diplomacy.", suit:"cups"},

  // Swords
  {name:"Ace of Swords", meaning:"New ideas, clarity, and truth.", suit:"swords"},
  {name:"Two of Swords", meaning:"Choices and indecision.", suit:"swords"},
  {name:"Three of Swords", meaning:"Heartbreak and sorrow.", suit:"swords"},
  {name:"Four of Swords", meaning:"Rest and recovery.", suit:"swords"},
  {name:"Five of Swords", meaning:"Conflict and tension.", suit:"swords"},
  {name:"Six of Swords", meaning:"Transition and moving forward.", suit:"swords"},
  {name:"Seven of Swords", meaning:"Strategy and cunning.", suit:"swords"},
  {name:"Eight of Swords", meaning:"Feeling trapped or restricted.", suit:"swords"},
  {name:"Nine of Swords", meaning:"Anxiety and worry.", suit:"swords"},
  {name:"Ten of Swords", meaning:"Endings and release.", suit:"swords"},
  {name:"Page of Swords", meaning:"Curiosity and vigilance.", suit:"swords"},
  {name:"Knight of Swords", meaning:"Action and assertiveness.", suit:"swords"},
  {name:"Queen of Swords", meaning:"Intelligence and clear communication.", suit:"swords"},
  {name:"King of Swords", meaning:"Authority and strategic thinking.", suit:"swords"},

  // Wands
  {name:"Ace of Wands", meaning:"New inspiration, creativity, and opportunity.", suit:"wands"},
  {name:"Two of Wands", meaning:"Planning and foresight.", suit:"wands"},
  {name:"Three of Wands", meaning:"Expansion and growth.", suit:"wands"},
  {name:"Four of Wands", meaning:"Celebration and harmony.", suit:"wands"},
  {name:"Five of Wands", meaning:"Competition and challenges.", suit:"wands"},
  {name:"Six of Wands", meaning:"Victory and recognition.", suit:"wands"},
  {name:"Seven of Wands", meaning:"Standing your ground.", suit:"wands"},
  {name:"Eight of Wands", meaning:"Swift action and progress.", suit:"wands"},
  {name:"Nine of Wands", meaning:"Persistence and resilience.", suit:"wands"},
  {name:"Ten of Wands", meaning:"Responsibility and burden.", suit:"wands"},
  {name:"Page of Wands", meaning:"Exploration and discovery.", suit:"wands"},
  {name:"Knight of Wands", meaning:"Adventure and courage.", suit:"wands"},
  {name:"Queen of Wands", meaning:"Confidence and determination.", suit:"wands"},
  {name:"King of Wands", meaning:"Leadership and vision.", suit:"wands"},

  // Pentacles
  {name:"Ace of Pentacles", meaning:"New financial or material opportunity.", suit:"pentacles"},
  {name:"Two of Pentacles", meaning:"Balance and adaptability.", suit:"pentacles"},
  {name:"Three of Pentacles", meaning:"Collaboration and skill.", suit:"pentacles"},
  {name:"Four of Pentacles", meaning:"Security and holding on.", suit:"pentacles"},
  {name:"Five of Pentacles", meaning:"Loss or financial hardship.", suit:"pentacles"},
  {name:"Six of Pentacles", meaning:"Generosity and sharing.", suit:"pentacles"},
  {name:"Seven of Pentacles", meaning:"Assessment and patience.", suit:"pentacles"},
  {name:"Eight of Pentacles", meaning:"Learning and mastery.", suit:"pentacles"},
  {name:"Nine of Pentacles", meaning:"Self-sufficiency and luxury.", suit:"pentacles"},
  {name:"Ten of Pentacles", meaning:"Family, legacy, and wealth.", suit:"pentacles"},
  {name:"Page of Pentacles", meaning:"New study or opportunity.", suit:"pentacles"},
  {name:"Knight of Pentacles", meaning:"Diligence and responsibility.", suit:"pentacles"},
  {name:"Queen of Pentacles", meaning:"Nurturing and practicality.", suit:"pentacles"},
  {name:"King of Pentacles", meaning:"Success and stability.", suit:"pentacles"},
];

// background colors for suits
const backgrounds = {
  major: "#000000",       // black
  cups: "#90ee90",        // light green
  swords: "#ffff99",      // light yellow
  pentacles: "#d8bfff",   // light purple
  wands: "#add8e6"        // light blue
};

// daily card
const today = new Date();
const dayIndex = Math.floor(today.getTime() / (1000*60*60*24)) % tarotDeck.length;
const card = tarotDeck[dayIndex];

// set text and background
document.getElementById("cardName").innerText = card.name;
document.getElementById("cardMeaning").innerText = card.meaning;
document.body.style.background = backgrounds[card.suit];
</script>

</body>
</html>
